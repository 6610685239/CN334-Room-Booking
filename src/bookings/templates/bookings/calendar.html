<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ปฏิทินห้องว่าง | ระบบจองห้อง</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .filter-section { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 1em; }
        #calendar { margin-top: 20px; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>ตารางห้องว่าง (Calendar View)</h2>
        <a href="{% url 'dashboard' %}" style="text-decoration: none; color: #C0392B; font-weight: bold;">กลับไป Dashboard</a>
    </div>

    <div class="filter-section">
        <label><strong>เลือกดูห้อง:</strong></label>
        <select id="roomSelector">
            <option value="">-- ดูทุกห้องรวมกัน --</option>
            {% for room in rooms %}
                <option value="{{ room.room_id }}">{{ room.name }} ({{ room.room_id }})</option>
            {% endfor %}
        </select>
        <span style="font-size: 0.9em; color: #666;">* ลากเมาส์คลุมช่วงเวลาว่างเพื่อเริ่มจอง</span>
    </div>

    <div id="calendar"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var roomSelector = document.getElementById('roomSelector');

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            slotMinTime: '08:00:00', 
            slotMaxTime: '20:00:00', 
            allDaySlot: false,
            selectable: true, 
            selectMirror: true,

            events: '/api/bookings/', 

            select: function(info) {
                var selectedRoom = roomSelector.value;
                if (!selectedRoom) {
                    alert('กรุณาเลือกห้องจากกล่องด้านบนก่อนทำการจองครับ');
                    calendar.unselect();
                    return;
                }

                if (info.allDay || !info.startStr.includes('T')) {
                    var startDate = info.startStr;
                    window.location.href = `/book/?room=${selectedRoom}&date=${startDate}`;
                } else {
                    var startStr = info.startStr.substring(0, 16);
                    var endStr = info.endStr.substring(0, 16);
                    window.location.href = `/book/?room=${selectedRoom}&start=${startStr}&end=${endStr}`;
                }
            }
        });

        calendar.render();

        roomSelector.addEventListener('change', function() {
            var roomId = this.value;
            calendar.removeAllEventSources();
            calendar.addEventSource('/api/bookings/?room_id=' + roomId);
        });
    });
</script>

</body>
</html>
